name: Android Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build release APKs
        run: flutter build apk --release --split-per-abi --tree-shake-icons

      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/veloce-express-arm64.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/veloce-express-armv7.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/veloce-express-x86_64.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: veloce-express-release-apks
          path: build/app/outputs/flutter-apk/veloce-express-*.apk
